version: '3'

# =====================================================
# Docker & Supporting Services Tasks
# =====================================================
#
# Usage notes:
# - create/remove: Use Task's built-in interactive HITL prompt (requires.vars + enum).
#   Run with `task --interactive create` or add `interactive: true` to .taskrc.yml.
#   CONFIRM=yes to bypass prompt.
# - up/down: Lightweight (start/stop only; assumes containers exist).
# - restart: Uses stop/start (avoids up/down as requested; no recreation).
# - clean: Also prompts (removes volumes too).
# - Individual up:*: Still use up -d for targeted creation; prefer top-level create for full stack.

tasks:
  create:
    desc: Create and start all Docker services (pulls images if needed). Requires confirmation (HITL prompt).
    requires:
      vars:
        - name: CONFIRM
          enum: [yes, no]
    cmds:
      - docker compose up -d
    silent: false

  remove:
    desc: Stop and remove all Docker containers/networks (volumes preserved). Requires confirmation (HITL prompt).
    requires:
      vars:
        - name: CONFIRM
          enum: [yes, no]
    cmds:
      - docker compose down
    silent: false

  up:
    desc: Start existing Docker services (use create for initial setup or if containers missing)
    cmds:
      - docker compose start
    silent: false

  down:
    desc: Stop Docker services without removing containers (use remove to fully remove)
    cmds:
      - docker compose stop
    silent: false

  restart:
    desc: Restart all Docker services (stop then start; does NOT use up/down)
    cmds:
      - docker compose stop
      - docker compose start
    silent: false

  logs:
    desc: Show logs from all Docker services
    cmds:
      - docker compose logs -f

  logs:errors:
    desc: Show only ERROR and WARN logs (best for LLM analysis)
    cmds:
      - docker compose logs --tail=200 -f | grep -E "(ERROR|WARN|error|warn)"

  status:
    desc: Check status of all Docker services
    cmds:
      - docker compose ps

  dev:supabase:
    desc: Start local Supabase via the Supabase CLI
    cmds:
      - supabase start

  stop:supabase:
    desc: Stop local Supabase
    cmds:
      - supabase stop

  status:supabase:
    desc: Show local Supabase status
    cmds:
      - supabase status

  clean:
    desc: Stop services and remove containers + volumes (destructive; use with caution). Requires confirmation.
    requires:
      vars:
        - name: CONFIRM
          enum: [yes, no]
    cmds:
      - docker compose down -v
    silent: false

  # Individual service commands
  up:inngest:
    desc: Create/start only Inngest (prefer top-level create/remove for full stack management)
    cmds:
      - docker compose up -d inngest

  up:litellm:
    desc: Create/start only LiteLLM (prefer top-level create/remove for full stack management)
    cmds:
      - docker compose up -d litellm

  up:langfuse:
    desc: Create/start only Langfuse (prefer top-level create/remove for full stack management)
    cmds:
      - docker compose up -d langfuse-web langfuse-worker

  logs:inngest:
    desc: Show Inngest logs
    cmds:
      - docker compose logs -f inngest

  logs:litellm:
    desc: Show LiteLLM logs
    cmds:
      - docker compose logs -f litellm

  logs:langfuse:
    desc: Show Langfuse logs
    cmds:
      - docker compose logs -f langfuse-web

  # =============================================================================
  # Convenience Commands
  # =============================================================================

  dev:
    desc: Start core development services (Inngest + LiteLLM + Langfuse). Use create for full stack + prompt.
    cmds:
      - docker compose up -d inngest litellm langfuse-web langfuse-worker

  logs:all:
    desc: Follow logs from all services
    cmds:
      - docker compose logs -f

  ps:
    desc: Show running services
    cmds:
      - docker compose ps
