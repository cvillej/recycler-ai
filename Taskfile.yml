version: '3'

tasks:
  default:
    cmds:
      - task: todo:status

  todo:dev:
    desc: Start the isolated Todo App (Vite UI + Hono API)
    cmds:
      - task: todo:stop
      - cd todo-app && npm run dev:full

  todo:stop:
    desc: Stop all Todo App processes
    cmds:
      - pkill -f "vite|dev:full|dev:api|server.ts|3001|5174" || true
      - echo "Stopped Todo App processes"

  todo:restart:
    desc: Restart the Todo App
    cmds:
      - task: todo:stop
      - sleep 2
      - task: todo:dev

  todo:build:
    desc: Build the Todo App
    dir: todo-app
    cmds:
      - npm run build

  todo:status:
    desc: Show status
    cmds:
      - ./scripts/todo-status.sh

  todo:clean:
    desc: Clean build
    cmds:
      - rm -rf todo-app/dist
      - echo "Cleaned"
