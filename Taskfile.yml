version: '3'

# =====================================================
# Docker & Supporting Services Tasks
# =====================================================

tasks:
  up:
    desc: Start all Docker services (Inngest, LiteLLM, Langfuse, Redis)
    cmds:
      - docker compose up -d
    silent: false

  down:
    desc: Stop all Docker services
    cmds:
      - docker compose down
    silent: false

  restart:
    desc: Restart all Docker services
    cmds:
      - docker compose down
      - docker compose up -d

  logs:
    desc: Show logs from all Docker services
    cmds:
      - docker compose logs -f

  logs:errors:
    desc: Show only ERROR and WARN logs (best for LLM analysis)
    cmds:
      - docker compose logs --tail=200 -f | grep -E "(ERROR|WARN|error|warn)"

  status:
    desc: Check status of all Docker services
    cmds:
      - docker compose ps

  dev:supabase:
    desc: Start local Supabase via the Supabase CLI
    cmds:
      - supabase start

  stop:supabase:
    desc: Stop local Supabase
    cmds:
      - supabase stop

  status:supabase:
    desc: Show local Supabase status
    cmds:
      - supabase status

  clean:
    desc: Stop services and remove volumes (use with caution)
    cmds:
      - docker compose down -v
    silent: false

  # Individual service commands
  up:inngest:
    desc: Start only Inngest
    cmds:
      - docker compose up -d inngest

  up:litellm:
    desc: Start only LiteLLM
    cmds:
      - docker compose up -d litellm

  up:langfuse:
    desc: Start only Langfuse
    cmds:
      - docker compose up -d langfuse-web langfuse-worker

  logs:inngest:
    desc: Show Inngest logs
    cmds:
      - docker compose logs -f inngest

  logs:litellm:
    desc: Show LiteLLM logs
    cmds:
      - docker compose logs -f litellm

  logs:langfuse:
    desc: Show Langfuse logs
    cmds:
      - docker compose logs -f langfuse-web

  # =============================================================================
  # Convenience Commands
  # =============================================================================

  dev:
    desc: Start core development services (Inngest + LiteLLM + Langfuse)
    cmds:
      - docker compose up -d inngest litellm langfuse-web langfuse-worker

  logs:all:
    desc: Follow logs from all services
    cmds:
      - docker compose logs -f

  ps:
    desc: Show running services
    cmds:
      - docker compose ps
