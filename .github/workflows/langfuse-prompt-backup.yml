name: Langfuse Prompt Backup

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LANGFUSE_PAT }}
          fetch-depth: 0

      - name: 🔍 Debug Payload
        run: |
          echo "Name    : ${{ github.event.client_payload.prompt.name }}"
          echo "Version : ${{ github.event.client_payload.prompt.version }}"
          echo "Labels  : ${{ join(github.event.client_payload.prompt.labels, ', ') }}"

      - name: Save Clean Prompt File (One file per prompt)
        run: |
          mkdir -p prompts
          
          # Make safe filename
          SAFE_NAME=$(echo "${{ github.event.client_payload.prompt.name }}" | tr '/' '_' | tr ' ' '_')
          
          # Save ONLY the clean prompt text (easy to read in GitHub)
          echo '${{ toJson(github.event.client_payload.prompt.prompt) }}' > "prompts/${SAFE_NAME}.prompt"
          
          # Optional: Also save full versioned metadata (recommended for history)
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "prompts/${SAFE_NAME}_v${{ github.event.client_payload.prompt.version }}.json"

          echo "✅ Saved clean prompt: prompts/${SAFE_NAME}.prompt"
          echo "✅ Also saved versioned JSON for history"

      - name: Commit & Push (Handles double triggers)
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"

          git add prompts/
          
          git commit -m "chore(langfuse): update '${{ github.event.client_payload.prompt.name }}' to v${{ github.event.client_payload.prompt.version }}" || echo "No changes to commit"
          
          git pull --rebase origin main || echo "No pull needed"
          git push
          echo "✅ Successfully pushed clean prompt file!"
