name: Langfuse Prompt Backup & CI

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'repository_dispatch' ||
      contains(github.event.client_payload.prompt.labels, 'latest')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Important for clean diffs

      - name: Debug - Show Labels & Payload
        run: |
          echo "🔍 Prompt Name: ${{ github.event.client_payload.prompt.name }}"
          echo "🔍 Version: ${{ github.event.client_payload.prompt.version }}"
          echo "🔍 Labels: ${{ join(github.event.client_payload.prompt.labels, ', ') }}"
          echo "🔍 Action: ${{ github.event.client_payload.action }}"
          echo "🔍 Has 'latest'? ${{ contains(github.event.client_payload.prompt.labels, 'latest') }}"

      - name: Save Prompt Files
        run: |
          mkdir -p prompts
          PROMPT_NAME="${{ github.event.client_payload.prompt.name }}"
          PROMPT_VERSION="${{ github.event.client_payload.prompt.version }}"
          SAFE_NAME=$(echo "$PROMPT_NAME" | tr '/' '_' | tr ' ' '_')

          echo "Saving files for ${PROMPT_NAME}..."

          # Clean prompt text
          echo '${{ toJson(github.event.client_payload.prompt.prompt) }}' > "prompts/${SAFE_NAME}.prompt"

          # Full metadata
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "prompts/${SAFE_NAME}_v${PROMPT_VERSION}.json"

          echo "✅ Files written:"
          ls -la prompts/

      - name: Commit & Push
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"

          echo "Checking for changes..."
          git status
          git diff --name-only prompts/ || echo "No diff output"

          if git diff --quiet prompts/; then
            echo "⚠️ No changes detected - nothing to commit"
          else
            git add prompts/
            git commit -m "chore(langfuse): backup '${{ github.event.client_payload.prompt.name }}' v${{ github.event.client_payload.prompt.version }}"
            git push
            echo "✅ Successfully committed and pushed!"
          fi

  deploy:
    needs: backup
    runs-on: ubuntu-latest
    if: contains(github.event.client_payload.prompt.labels, 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying ${{ github.event.client_payload.prompt.name }} v${{ github.event.client_payload.prompt.version }}"
          echo "Deployment completed for production prompt."
