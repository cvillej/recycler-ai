name: Langfuse Prompt Backup

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LANGFUSE_PAT }}   # ← Using your PAT
          fetch-depth: 0

      - name: 🔍 Debug Payload
        run: |
          echo "Name    : ${{ github.event.client_payload.prompt.name }}"
          echo "Version : ${{ github.event.client_payload.prompt.version }}"
          echo "Labels  : ${{ join(github.event.client_payload.prompt.labels, ', ') }}"

      - name: Save Prompt Files
        run: |
          mkdir -p prompts
          SAFE_NAME=$(echo "${{ github.event.client_payload.prompt.name }}" | tr '/' '_' | tr ' ' '_')
          VERSION="${{ github.event.client_payload.prompt.version }}"

          echo '${{ toJson(github.event.client_payload.prompt.prompt) }}' > "prompts/${SAFE_NAME}.prompt"
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "prompts/${SAFE_NAME}_v${VERSION}.json"

          echo "✅ Files created:"
          ls -la prompts/

      - name: Commit & Push
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"

          git add prompts/
          git commit -m "chore(langfuse): backup '${{ github.event.client_payload.prompt.name }}' v${{ github.event.client_payload.prompt.version }}" || echo "No changes to commit"
          git push
          echo "✅ Successfully committed and pushed!"
