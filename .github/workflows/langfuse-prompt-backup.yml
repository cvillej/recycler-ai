name: Langfuse Prompt Backup

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LANGFUSE_PAT }}
          fetch-depth: 0

      - name: 🔍 Debug
        run: |
          echo "Name    : ${{ github.event.client_payload.prompt.name }}"
          echo "Version : ${{ github.event.client_payload.prompt.version }}"
          echo "Labels  : ${{ join(github.event.client_payload.prompt.labels, ', ') }}"

      - name: Save Clean Prompt (One file per prompt)
        run: |
          mkdir -p prompts
          SAFE_NAME=$(echo "${{ github.event.client_payload.prompt.name }}" | tr '/' '_' | tr ' ' '_')
          
          # Clean latest prompt (overwritten on every update)
          echo '${{ toJson(github.event.client_payload.prompt.prompt) }}' > "prompts/${SAFE_NAME}.prompt"
          
          # Keep versioned history (optional but useful)
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "prompts/${SAFE_NAME}_v${{ github.event.client_payload.prompt.version }}.json"

          echo "✅ Updated prompts/${SAFE_NAME}.prompt"

      - name: Commit & Push (Robust against race conditions)
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"

          git add prompts/

          # Commit (safe if no change)
          git commit -m "chore(langfuse): update '${{ github.event.client_payload.prompt.name }}' to v${{ github.event.client_payload.prompt.version }}" || echo "No changes"

          # Robust push with retry + rebase
          for i in {1..3}; do
            echo "Attempt $i to push..."
            git pull --rebase origin main || true
            if git push; then
              echo "✅ Push successful!"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Push failed after retries"
          exit 1
