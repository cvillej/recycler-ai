name: Langfuse Prompt Backup

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    
    # Only run on the latest version → greatly reduces conflicts
    if: contains(github.event.client_payload.prompt.labels, 'latest')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LANGFUSE_PAT }}
          fetch-depth: 0

      - name: Save Clean Prompt (Latest only)
        run: |
          mkdir -p prompts
          SAFE_NAME=$(echo "${{ github.event.client_payload.prompt.name }}" | tr '/' '_' | tr ' ' '_')
          
          # Always write the latest prompt text
          echo '${{ toJson(github.event.client_payload.prompt.prompt) }}' > "prompts/${SAFE_NAME}.prompt"
          
          # Keep versioned history (safe, different filenames)
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "prompts/${SAFE_NAME}_v${{ github.event.client_payload.prompt.version }}.json"

          echo "✅ Updated prompts/${SAFE_NAME}.prompt"

      - name: Commit & Push (Conflict Resistant)
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"

          git add prompts/

          # Commit changes
          git commit -m "chore(langfuse): update '${{ github.event.client_payload.prompt.name }}' to v${{ github.event.client_payload.prompt.version }}" || echo "No changes"

          # Robust push strategy
          echo "Pulling latest..."
          git pull --rebase origin main || true

          # If conflict happens on .prompt file, take OUR version (the newer one)
          if git status | grep -q "both modified"; then
            echo "Conflict detected - keeping latest version"
            git checkout --ours prompts/*.prompt
            git add prompts/*.prompt
            git rebase --continue || true
          fi

          # Final push
          git push || {
            echo "Final push attempt with force-with-lease..."
            git push --force-with-lease
          }

          echo "✅ Push completed successfully!"
