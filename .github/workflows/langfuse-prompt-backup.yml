name: Langfuse Prompt Backup

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    
    # Only run for the latest version to avoid conflicts
    if: contains(github.event.client_payload.prompt.labels, 'latest')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LANGFUSE_PAT }}
          fetch-depth: 0

      - name: Save Full Prompt Metadata (Single File)
        run: |
          mkdir -p prompts
          
          # Create safe filename from prompt name
          SAFE_NAME=$(echo "${{ github.event.client_payload.prompt.name }}" | tr '/' '_' | tr ' ' '_')
          
          # Save FULL metadata as JSON (this is what you asked for)
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "prompts/${SAFE_NAME}.json"

          echo "✅ Updated full metadata file: prompts/${SAFE_NAME}.json"

      - name: Commit & Push
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"

          git add prompts/

          git commit -m "chore(langfuse): update '${{ github.event.client_payload.prompt.name }}' to v${{ github.event.client_payload.prompt.version }}" || echo "No changes to commit"

          # Robust push handling
          git pull --rebase origin main || true
          git push || {
            echo "Retrying push..."
            git pull --rebase origin main || true
            git push
          }

          echo "✅ Successfully pushed full prompt metadata"
