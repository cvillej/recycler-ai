name: Langfuse Prompt CI + Backup

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:  # Allows manual triggering for testing

jobs:
  backup-and-test:
    runs-on: ubuntu-latest
    # Optional: Skip old versions to avoid double runs
    if: >
      github.event_name != 'repository_dispatch' ||
      contains(github.event.client_payload.prompt.labels, 'latest')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Needed for committing

      - name: Save prompt to file (Backup)
        run: |
          mkdir -p prompts
          PROMPT_NAME="${{ github.event.client_payload.prompt.name }}"
          PROMPT_VERSION="${{ github.event.client_payload.prompt.version }}"
          FILENAME="prompts/${PROMPT_NAME}_v${PROMPT_VERSION}.json"

          # Write the full prompt object as JSON
          echo '${{ toJson(github.event.client_payload.prompt) }}' > "$FILENAME"

          echo "✅ Backed up prompt: $PROMPT_NAME v$PROMPT_VERSION → $FILENAME"

      - name: Commit and push backup (if changed)
        run: |
          git config user.name "Langfuse Bot"
          git config user.email "langfuse-bot@users.noreply.github.com"
          
          if git diff --quiet prompts/; then
            echo "No changes to commit"
          else
            git add prompts/
            git commit -m "chore: backup Langfuse prompt ${{ github.event.client_payload.prompt.name }} v${{ github.event.client_payload.prompt.version }}
          
          Action: ${{ github.event.client_payload.action || 'updated' }}"
            git push
            echo "✅ Committed prompt backup to GitHub"
          fi

      - name: Run tests on prompt
        run: |
          echo "Testing prompt: ${{ github.event.client_payload.prompt.name }} v${{ github.event.client_payload.prompt.version }}"
          # Add your actual tests here, e.g.:
          # npm test
          # python -m pytest tests/prompts/
          # or run prompt-specific eval scripts

  deploy:
    needs: backup-and-test
    runs-on: ubuntu-latest
    if: >
      (github.event_name != 'repository_dispatch' || 
       contains(github.event.client_payload.prompt.labels, 'production'))

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying ${{ github.event.client_payload.prompt.name }} v${{ github.event.client_payload.prompt.version }}"
          # Your actual deployment commands here
          # e.g. deploy to Vercel, AWS, or update your app config
