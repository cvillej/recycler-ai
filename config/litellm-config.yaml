litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 600
  telemetry: false
  callbacks:
    - custom_hooks.GrokCleaner

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false
  allow_requests_on_db_unavailable: true
  disable_streaming: false

model_list:
  - model_name: grok
    litellm_params:
      model: xai/grok-4-1-fast-non-reasoning
      api_key: os.environ/XAI_API_KEY
      drop_params: true
      modify_params: true
      additional_drop_params:
        - response_format
        - logprobs
        - stream_options
        - parallel_tool_calls
        - store
        - reasoning_effort
        - tool_choice

  - model_name: grok-responses
    litellm_params:
      model: xai/grok-4-1-fast-non-reasoning
      api_key: os.environ/XAI_API_KEY
      extra_body:
        use_responses: true
      drop_params: true
      modify_params: true
      additional_drop_params:
        - response_format
        - logprobs
        - stream_options
        - parallel_tool_calls
        - store
        - reasoning_effort
        - tool_choice
